name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: --target aarch64-apple-darwin
            sidecar-triple: ""
          # Intel macOS is cross-compiled on the arm64 runner: GitHub
          # retired the Intel (macos-13) runners.
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            sidecar-triple: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            sidecar-triple: ""
          - platform: windows-latest
            args: ""
            sidecar-triple: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - run: npm ci

      - name: Refetch ffmpeg for cross-compile target
        if: matrix.sidecar-triple != ''
        run: npm rebuild ffmpeg-static
        env:
          npm_config_arch: x64

      - name: Provision sidecar binaries
        shell: bash
        run: |
          if [ -n "${{ matrix.sidecar-triple }}" ]; then
            node scripts/prepare-sidecars.mjs --triple=${{ matrix.sidecar-triple }}
          else
            node scripts/prepare-sidecars.mjs
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Transmogrifier ${{ github.ref_name }}"
          releaseDraft: true
          args: ${{ matrix.args }}
